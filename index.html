<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eras Tour : Trivia Ultime</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

        :root {
            --bg-color: #0b0a10; /* Midnight blue très sombre */
            --card-bg: #15131c;
            --lavender: #c2a3d1; /* Lavender Haze */
            --gold: #d4af37; /* Fearless gold */
            --correct-color: #27ae60;
            --wrong-color: #e74c3c; /* Red era */
            --text-light: #fdfdfd;
            --text-muted: #8a8893;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #241c38 0%, #0b0a10 80%);
        }

        .quiz-container {
            background-color: var(--card-bg);
            border: 1px solid rgba(194, 163, 209, 0.15);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 20px rgba(194, 163, 209, 0.05);
            width: 90%;
            max-width: 650px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.05);
            display: none;
        }

        .progress-bar {
            height: 100%;
            /* Dégradé rappelant les Eras : Lover, Fearless, Speak Now, Red, 1989, Reputation */
            background: linear-gradient(90deg, #f7b0cc, #f2d07b, #b992c6, #c02d38, #b5e1e9, #000000);
            width: 0%;
            transition: width 0.4s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--lavender);
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            font-weight: 400;
        }
        
        .subtitle {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        /* Styles de l'écran d'accueil */
        .pseudo-input {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--text-muted);
            color: var(--text-light);
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .pseudo-input:focus {
            outline: none;
            border-color: var(--lavender);
            box-shadow: 0 1px 0 var(--lavender);
        }

        .pseudo-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-style: italic;
        }

        .action-btn {
            background-color: transparent;
            color: var(--lavender);
            border: 1px solid var(--lavender);
            padding: 14px 35px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            margin-top: 10px;
            width: 80%;
            max-width: 250px;
        }

        .action-btn:hover {
            background-color: var(--lavender);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(194, 163, 209, 0.4);
        }

        .share-btn {
            border-color: var(--gold);
            color: var(--gold);
            margin-top: 15px;
            font-size: 12px;
        }

        .share-btn:hover {
            background-color: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .reset-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 10px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: block;
            margin: 15px auto 0;
            transition: color 0.3s;
        }

        .reset-btn:hover {
            color: var(--wrong-color);
        }

        .leaderboard-container {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaderboard-title {
            font-size: 13px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .leaderboard-list {
            list-style: none;
            text-align: left;
            width: 90%;
            margin: 0 auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 15px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .lb-rank {
            color: var(--text-muted);
            width: 30px;
            font-weight: 300;
        }

        .rank-gold {
            color: var(--gold);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .lb-name {
            flex-grow: 1;
            padding-right: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lb-score-wrap {
            text-align: right;
            min-width: 80px;
        }

        .lb-score {
            color: var(--lavender);
            font-weight: 500;
        }

        .lb-time {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
            margin-top: 2px;
        }

        /* Styles du Quiz */
        .question-text {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 30px;
            margin-top: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(194, 163, 209, 0.15);
            color: var(--text-light);
            padding: 16px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--lavender);
            background: rgba(194, 163, 209, 0.05);
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background-color: rgba(39, 174, 96, 0.15);
            border-color: var(--correct-color);
            color: var(--correct-color);
        }

        .option-btn.incorrect {
            background-color: rgba(231, 76, 60, 0.15);
            border-color: var(--wrong-color);
            color: var(--wrong-color);
        }

        .score-text {
            font-size: 48px;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            margin: 10px 0;
        }

        .score-text span {
            color: var(--lavender);
        }
        
        .time-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .error-msg {
            color: var(--wrong-color);
            font-size: 12px;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #quiz-block, #result-container {
            display: none;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="progress-bar-container" id="progress-wrapper">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div id="start-screen" class="fade-in">
            <h1>The Eras Tour Trivia</h1>
            <div class="subtitle">Êtes-vous prêt(e) pour ça ?</div>
            <input type="text" id="pseudo-input" class="pseudo-input" placeholder="Entrez votre nom de Swiftie..." autocomplete="off" maxlength="15">
            <p id="error-msg" class="error-msg">Veuillez entrer un pseudo.</p>
            <button class="action-btn" onclick="startQuiz()">Démarrer</button>
            <button class="reset-btn" onclick="resetScores()">Réinitialiser le classement</button>

            <div class="leaderboard-container">
                <div class="leaderboard-title">Masterminds (Top 5)</div>
                <ul class="leaderboard-list" id="leaderboard-list">
                    </ul>
            </div>
        </div>

        <div id="quiz-block">
            <div class="question-text" id="question">Chargement...</div>
            <div class="options-container" id="options">
                </div>
        </div>

        <div id="result-container">
            <h1>Long Story Short...</h1>
            <div class="score-text"><span id="score">0</span> / 15</div>
            <div class="time-text" id="time-display">Temps: 0s</div>
            <p id="score-message" style="margin-bottom: 20px; color: var(--text-muted); line-height: 1.5;"></p>
            <button class="action-btn" onclick="returnToHome()">Classement</button>
            <button class="action-btn share-btn" onclick="shareScore()">Copier & Défier</button>
        </div>
    </div>

    <script>
        // Nouvelles questions The Eras Tour (Facile -> Difficile)
        const baseQuizData = [
            // Facile
            { question: "Quel est le nom donné aux fans de Taylor Swift ?", options: ["Les Taylors", "The Squad", "Les Swifties", "Les Fearless"], correct: 2 },
            { question: "Combien d'ères (albums) The Eras Tour célébrait-il officiellement à son lancement ?", options: ["8", "9", "10", "11"], correct: 2 },
            { question: "Quelle tradition les fans s'échangent-ils pendant la tournée, inspirée de la chanson 'You're On Your Own, Kid' ?", options: ["Des polaroïds", "Des bracelets d'amitié", "Des bagues serpent", "Des t-shirts"], correct: 1 },
            { question: "Quelle chanson très énergique clôture chaque concert de la tournée ?", options: ["Shake It Off", "Cruel Summer", "Karma", "Bejeweled"], correct: 2 },
            { question: "Quel objet Taylor offre-t-elle à un fan chanceux dans le public pendant la chanson '22' ?", options: ["Son chapeau noir", "Ses lunettes de soleil", "Un t-shirt signé", "Un médiator"], correct: 0 },
            
            // Moyen
            { question: "Dans quelle ville américaine The Eras Tour a-t-il officiellement débuté en mars 2023 (renommée Swift City pour l'occasion) ?", options: ["Los Angeles", "New York", "Glendale", "Nashville"], correct: 2 },
            { question: "Quel grand couturier a conçu le célèbre body incrusté de cristaux porté pour l'ouverture (ère Lover) ?", options: ["Versace", "Dior", "Chanel", "Oscar de la Renta"], correct: 0 },
            { question: "Quel album a été intégré par surprise à la setlist pour la première fois lors des concerts à Paris en mai 2024 ?", options: ["Midnights", "The Tortured Poets Department", "Speak Now (Taylor's Version)", "Evermore"], correct: 1 },
            { question: "Quelle chanson, dont la version dure 10 minutes, est le point culminant et dramatique de l'ère Red sur scène ?", options: ["Dear John", "All Too Well", "Champagne Problems", "Tolerate It"], correct: 1 },
            { question: "Combien de 'chansons surprises' en acoustique y a-t-il traditionnellement par concert ?", options: ["1", "2", "3", "4"], correct: 1 },
            
            // Difficile
            { question: "Qui est le danseur de la tournée devenu iconique pour ses répliques improvisées dans la langue locale pendant 'We Are Never Ever Getting Back Together' ?", options: ["Kam Saunders", "Christian Henderson", "Jan Ravnik", "Whyley Yoshimura"], correct: 0 },
            { question: "Pendant l'ère Reputation, un immense serpent virtuel serpente sur la scène. Quel est son petit nom ?", options: ["Nagini", "Karyn", "Olivia", "Taylor"], correct: 1 },
            { question: "À qui Taylor Swift a-t-elle fait appel pour chorégraphier l'intégralité des tableaux gigantesques du Eras Tour ?", options: ["Mandy Moore", "Parris Goebel", "Kenny Ortega", "Laurieann Gibson"], correct: 0 },
            { question: "Lequel de ces effets visuels N'EST PAS utilisé pendant le concert ?", options: ["Des vélos lumineux", "Une cabane en bois dans une forêt", "Un plongeon virtuel sous la scène", "Un vol au-dessus du public en drone"], correct: 3 },
            { question: "Environ combien de camions semi-remorques sont nécessaires pour transporter l'infrastructure complète d'un seul concert de la tournée ?", options: ["Environ 30", "Environ 50", "Environ 90", "Environ 150"], correct: 2 }
        ];

        let activeQuizData = []; 
        let currentQuestionIndex = 0;
        let score = 0;
        let currentPseudo = "";
        let startTime = 0;
        let totalTime = 0;
        // On change la clé de sauvegarde pour ne pas mélanger avec le quiz Toyota !
        let leaderboard = JSON.parse(localStorage.getItem('erasTourLeaderboard')) || [];

        const startScreen = document.getElementById('start-screen');
        const quizBlock = document.getElementById('quiz-block');
        const resultContainer = document.getElementById('result-container');
        const progressWrapper = document.getElementById('progress-wrapper');
        const progressBar = document.getElementById('progress-bar');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const scoreEl = document.getElementById('score');
        const timeDisplayEl = document.getElementById('time-display');
        const scoreMessageEl = document.getElementById('score-message');
        const pseudoInput = document.getElementById('pseudo-input');
        const errorMsg = document.getElementById('error-msg');
        const leaderboardList = document.getElementById('leaderboard-list');

        renderLeaderboard();

        pseudoInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') startQuiz();
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderLeaderboard() {
            leaderboardList.innerHTML = '';
            
            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = '<li style="text-align:center; color:#8a8893; font-size:13px; font-style:italic;">It\'s me, hi... Aucun score pour le moment.</li>';
                return;
            }

            leaderboard.sort((a, b) => {
                if (b.score !== a.score) {
                    return b.score - a.score;
                }
                return a.time - b.time;
            });

            const top5 = leaderboard.slice(0, 5);

            top5.forEach((entry, index) => {
                const li = document.createElement('li');
                li.classList.add('leaderboard-item');
                
                const rankClass = index === 0 ? 'lb-rank rank-gold' : 'lb-rank';
                
                li.innerHTML = `
                    <span class="${rankClass}">#${index + 1}</span>
                    <span class="lb-name">${entry.name}</span>
                    <div class="lb-score-wrap">
                        <span class="lb-score">${entry.score} pts</span>
                        <span class="lb-time">${entry.time} sec</span>
                    </div>
                `;
                leaderboardList.appendChild(li);
            });
        }

        function saveScore() {
            const existingPlayerIndex = leaderboard.findIndex(p => p.name.toLowerCase() === currentPseudo.toLowerCase());
            
            if(existingPlayerIndex !== -1) {
                const existing = leaderboard[existingPlayerIndex];
                if(score > existing.score || (score === existing.score && totalTime < existing.time)) {
                    leaderboard[existingPlayerIndex].score = score;
                    leaderboard[existingPlayerIndex].time = totalTime;
                }
            } else {
                leaderboard.push({ name: currentPseudo, score: score, time: totalTime });
            }
            
            localStorage.setItem('erasTourLeaderboard', JSON.stringify(leaderboard));
            renderLeaderboard();
        }

        function startQuiz() {
            const pseudo = pseudoInput.value.trim();
            if (pseudo === "") {
                errorMsg.style.display = 'block';
                return;
            }
            errorMsg.style.display = 'none';
            currentPseudo = pseudo;

            activeQuizData = JSON.parse(JSON.stringify(baseQuizData));
            shuffleArray(activeQuizData);

            activeQuizData.forEach(q => {
                const correctText = q.options[q.correct];
                shuffleArray(q.options);
                q.correct = q.options.indexOf(correctText);
            });

            currentQuestionIndex = 0;
            score = 0;
            startTime = Date.now();

            startScreen.style.display = 'none';
            progressWrapper.style.display = 'block';
            quizBlock.style.display = 'block';
            quizBlock.classList.add('fade-in');

            loadQuestion();
        }

        function loadQuestion() {
            quizBlock.classList.remove('fade-in');
            void quizBlock.offsetWidth; 
            quizBlock.classList.add('fade-in');

            const currentData = activeQuizData[currentQuestionIndex];
            questionEl.innerText = currentData.question;
            
            const progressPercent = (currentQuestionIndex / activeQuizData.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            optionsEl.innerHTML = '';
            
            currentData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = (e) => selectAnswer(index, e.target);
                optionsEl.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, btnElement) {
            const correctIndex = activeQuizData[currentQuestionIndex].correct;
            const allButtons = optionsEl.querySelectorAll('.option-btn');
            
            allButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === correctIndex) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('incorrect');
                allButtons[correctIndex].classList.add('correct');
            }

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < activeQuizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1000); 
        }

        function showResults() {
            totalTime = Math.floor((Date.now() - startTime) / 1000);

            quizBlock.style.display = 'none';
            resultContainer.style.display = 'block';
            resultContainer.classList.add('fade-in');
            progressBar.style.width = '100%';
            
            scoreEl.innerText = score;
            timeDisplayEl.innerText = `Chrono : ${totalTime} secondes`;
            
            saveScore();

            let msg = "";
            if (score === 15) msg = `Parfait ${currentPseudo} ! Tu es le/la véritable Mastermind. À ce niveau, tu pourrais remplacer Taylor sur scène.`;
            else if (score >= 10) msg = `Superbe ${currentPseudo} ! Tu connais tes Eras sur le bout des doigts. Prêt(e) pour le premier rang VIP.`;
            else if (score >= 5) msg = `Pas mal ${currentPseudo} ! Tu as survécu à la Grande Guerre des billets, mais il faut encore réviser la setlist.`;
            else msg = `Ouch ${currentPseudo}... Il est temps d'écouter la discographie complète (Taylor's Version) de toute urgence.`;
            
            scoreMessageEl.innerText = msg;
        }

        function returnToHome() {
            resultContainer.style.display = 'none';
            progressWrapper.style.display = 'none';
            startScreen.style.display = 'block';
            startScreen.classList.add('fade-in');
            pseudoInput.value = ''; 
        }

        function resetScores() {
            if (confirm("Êtes-vous sûr(e) de vouloir effacer le classement de la tournée ? Cette action est irréversible.")) {
                leaderboard = [];
                localStorage.removeItem('erasTourLeaderboard');
                renderLeaderboard();
            }
        }

        function shareScore() {
            const url = window.location.href;
            const textToCopy = `✨ J'ai survécu au Eras Tour Trivia avec un score de ${score}/15 en ${totalTime}s ! Are you ready for it? Viens battre mon score : ${url}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Message copié ! Prêt à être envoyé à tes collègues Swifties 🪩");
            }).catch(err => {
                alert("Oops, impossible de copier automatiquement. Voici votre score : " + score + "/15 en " + totalTime + "s !");
            });
        }
    </script>
</body>
</html>
